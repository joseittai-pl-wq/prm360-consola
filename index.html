<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRM 360 · Consola</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2314303D'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%23A8843C' font-family='Arial' font-weight='bold'>P</text></svg>">
<style>:root{--navy:#14303D;--navy2:#1d4152;--gold:#A8843C;--gold-soft:#c9a862;--cream:#F7F1E4;--ink:#1c2b33;--muted:#6b7a82;--line:#e3ddce;--bg:#eef1f2;--ok:#3f8f5b;--wait:#b8862f;--teal:#2e6f7e;--plum:#7a5aa6;--danger:#b8442f}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}.hidden{display:none!important}#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),var(--navy2));padding:20px}.loginbox{background:#fff;border-radius:18px;padding:34px 32px;width:100%;max-width:390px;box-shadow:0 20px 60px rgba(0,0,0,.25)}.brand{text-align:center;margin-bottom:22px}.brand .logo{font-size:30px;font-weight:800;color:var(--navy);letter-spacing:1px}.brand .logo span{color:var(--gold)}.brand .t{font-size:12.5px;color:var(--muted);margin-top:4px}.field{margin-bottom:14px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}.field input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:14px}.field input:focus{outline:none;border-color:var(--gold)}.btn{width:100%;padding:12px;border:0;border-radius:9px;background:var(--navy);color:#fff;font-size:14px;font-weight:700;cursor:pointer}.btn:hover{background:var(--navy2)}.btn.gold{background:var(--gold)}.btn.gold:hover{background:#96742f}.toggle{text-align:center;margin-top:16px;font-size:12.5px;color:var(--muted)}.toggle a{color:var(--gold);font-weight:700;cursor:pointer;text-decoration:none}.msg{font-size:12.5px;padding:10px 12px;border-radius:8px;margin-bottom:14px;line-height:1.4}.msg.err{background:#f7e6e0;color:var(--danger)}.msg.ok{background:#e6f2ea;color:var(--ok)}#app{min-height:100vh;display:flex;flex-direction:column}.topbar{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 22px;gap:12px}.topbar .lg{font-size:18px;font-weight:800;letter-spacing:.5px}.topbar .lg span{color:var(--gold-soft)}.topbar .right{display:flex;align-items:center;gap:14px;font-size:13px}.rolebadge{background:var(--gold);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:capitalize}.linkout{color:#cfe0e6;cursor:pointer;font-size:12.5px}.main{flex:1;display:flex}.nav{width:210px;background:#fff;border-right:1px solid var(--line);padding:14px 10px;flex:none}.nav a{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;font-size:13.5px;color:var(--ink);cursor:pointer;text-decoration:none;margin-bottom:2px}.nav a:hover{background:var(--cream)}.nav a.active{background:var(--navy);color:#fff}.nav a .ic{width:18px;text-align:center}.content{flex:1;padding:24px 26px;overflow:auto}@media(max-width:760px){.nav{width:56px}.nav a .tx{display:none}}h1.pg{font-size:20px;color:var(--navy);margin:0 0 4px}.pgsub{font-size:13px;color:var(--muted);margin-bottom:20px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}.tile{background:#fff;border:1px solid var(--line);border-radius:13px;padding:16px;position:relative;overflow:hidden}.tile .bar{position:absolute;top:0;left:0;right:0;height:4px}.tile .num{font-size:27px;font-weight:800;color:var(--navy)}.tile .lbl{font-size:12px;color:var(--muted);margin-top:6px}.card{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;margin-bottom:20px}.card h3{margin:0;background:var(--cream);color:var(--navy);font-size:13.5px;padding:11px 16px;border-bottom:1px solid var(--line)}.card .body{padding:16px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:9px 14px;border-bottom:1px solid #f2eee3}th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}tr:last-child td{border-bottom:0}.tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px}.tag.on{background:#e6f2ea;color:var(--ok)}.tag.off{background:#eef1f2;color:var(--muted)}.tag.repse{background:#f0e9f7;color:var(--plum)}.empty{padding:26px;text-align:center;color:var(--muted);font-size:13px}.loader{padding:40px;text-align:center;color:var(--muted)}.banner{background:#fbf4e2;border:1px solid var(--gold-soft);border-radius:10px;padding:12px 15px;font-size:13px;color:#6b551f;margin-bottom:18px}.center-msg{max-width:460px;margin:60px auto;text-align:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:34px}.center-msg .em{font-size:40px}.center-msg h2{color:var(--navy);margin:14px 0 8px}.center-msg p{color:var(--muted);font-size:13.5px;line-height:1.6}.frm{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}.frm.imp{gap:8px}.frm label{display:flex;flex-direction:column;font-size:11px;color:var(--muted);gap:4px;font-weight:600}.frm input,.frm select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;min-width:130px;font-family:inherit}.frm.imp input{min-width:88px;width:98px}.btn2{background:var(--navy);color:#fff;border:0;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}.btn2:hover{background:var(--navy2)}.btn2.ghost{background:#eef1f2;color:var(--navy)}td select{padding:5px 6px;border:1px solid var(--line);border-radius:6px;font-size:12px;max-width:190px;font-family:inherit}button.mini{background:var(--gold);color:#fff;border:0;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer}.num-r{text-align:right}tr.clk{cursor:pointer}tr.clk:hover{background:var(--cream)}.cols2{display:grid;grid-template-columns:1fr 1fr;gap:18px}@media(max-width:820px){.cols2{grid-template-columns:1fr}}.tl{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid #f2eee3}.tl:last-child{border-bottom:0}.tl-dot{width:12px;height:12px;border-radius:50%;background:var(--gold);flex:none;margin-top:4px}.tl-date{font-size:11px;color:var(--muted);margin-left:6px}.tl-ev{font-size:12px;color:var(--muted);margin-top:2px}.card table th{white-space:nowrap}
/* ===== Sidebar por departamento ===== */
#nav.nav{width:292px;background:linear-gradient(180deg,#1e2f3d,#16232e);border-right:0;padding:10px 8px}
#nav .dm-note{padding:8px 12px;font-size:11px;color:#c9d4da}
#nav .dm-block{margin-bottom:2px}
#nav .dm-head{width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:0;cursor:pointer;color:#e7edf1;font-size:13.5px;font-weight:600;padding:11px 12px;border-radius:9px;text-align:left;font-family:inherit}
#nav .dm-head:hover{background:rgba(255,255,255,.05)}
#nav .dm-step{width:21px;height:21px;flex:none;border-radius:50%;background:#c39a4f;color:#16232e;font-size:11.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
#nav .dm-name{flex:1}
#nav .dm-chev{color:#c39a4f;font-size:16px;transition:transform .2s ease;transform:rotate(0deg)}
#nav .dm-block.open>.dm-head .dm-chev{transform:rotate(90deg)}
#nav .dm-sub{max-height:0;overflow:hidden;transition:max-height .28s ease}
#nav .dm-block.open>.dm-sub{max-height:640px}
#nav a.dm-link{display:flex;align-items:center;gap:9px;padding:9px 12px 9px 44px;margin:1px 0;border-radius:8px;font-size:12.5px;color:#b9c6cd;cursor:pointer;text-decoration:none;background:transparent}
#nav a.dm-link:hover{background:rgba(255,255,255,.06);color:#fff}
#nav a.dm-link.active{background:rgba(195,154,79,.14);color:#fff;box-shadow:inset 3px 0 0 #c39a4f}
#nav a.dm-link .dm-dot{width:7px;height:7px;flex:none;border-radius:50%;background:#8ea3ac}
#nav a.dm-link .dm-dot.dm-dot-n{background:#33c06a}
#nav a.dm-link .dm-tx{flex:1}
@media(max-width:760px){#nav.nav{width:292px}}
@media print{ #nav,.topbar{display:none!important} #content{padding:0!important} .no-print{display:none!important} }</style>
</head>
<body>
<div id="login">
  <div class="loginbox">
    <div class="brand">
      <div class="logo">PRM&nbsp;<span>360</span></div>
      <div class="t">Consola interna · PR&amp;M Business Group</div>
    </div>
    <div id="authmsg" class="msg hidden"></div>
    <div class="field"><label>Correo</label><input id="email" type="email" autocomplete="email" placeholder="tu@correo.com"></div>
    <div class="field"><label>Contraseña</label><input id="pass" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="btn" id="btnLogin">Entrar</button>
    <div id="signupExtra" class="hidden" style="margin-top:10px">
      <button class="btn gold" id="btnSignup">Crear cuenta</button>
    </div>
    <div class="toggle" id="toggleWrap">¿No tienes cuenta? <a id="toSignup">Regístrate</a></div>
  </div>
</div>
<div id="app" class="hidden">
  <div class="topbar">
    <div class="lg">PRM&nbsp;<span>360</span></div>
    <div class="right">
      <span id="who"></span>
      <span class="rolebadge" id="roleBadge">—</span>
      <select id="deptPreview" class="hidden" style="background:var(--gold);color:#fff;border:0;border-radius:20px;font-size:11px;font-weight:700;padding:3px 8px;cursor:pointer"></select>
      <input id="gsearch" placeholder="Buscar RFC o nombre…" style="padding:6px 10px;border:0;border-radius:8px;font-size:12.5px;width:180px">
      <span class="linkout" id="btnExport" title="Exportar a Excel/CSV">⬇ Exportar</span>
      <span class="linkout" id="btnPrint" title="Imprimir / PDF">🖨</span>
      <span class="linkout" id="btnLogout">Salir</span>
    </div>
  </div>
  <div class="main">
    <nav class="nav" id="nav"></nav>
    <div class="content" id="content"><div class="loader">Cargando…</div></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
